<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Rish Nexus | Transaction History</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="top-bar">
    <div class="container">
      <h1 class="site-title">Transaction History</h1>
      <p class="site-subtitle">Rish Nexus Transaction Tracking</p>
    </div>
  </header>

  <nav class="navbar navbar-expand-lg custom-nav">
    <div class="container">
      <a class="navbar-brand nav-brand" href="index.html">Rish Nexus</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="finalization.html">Finalization</a>
          </li>
          <li class="nav-item">

          </li>
          <li class="nav-item">
            <a class="nav-link" href="approval.html">Approval</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5 animate-slide-up">
    <div class="table-box">
      <h2 class="mb-3">All Transactions</h2>

      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
          <thead>
            <tr>
              <th>Transaction ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Participation</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="orderTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="footer-area">
    <div class="container">
      <p class="mb-0">Rish Nexus | Transaction History Page</p>
    </div>
  </footer>

  <script src="js/rishorder-history.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
