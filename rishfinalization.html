<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalization | Rish Nexus</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="top-bar">
  <div class="container">
    <h1 class="site-title">Finalization Page</h1>
    <p class="site-subtitle">Confirm Membership Details</p>
  </div>
</header>

<nav class="navbar navbar-expand-lg custom-nav">
  <div class="container">
    <a class="navbar-brand nav-brand" href="index.html">Rish Nexus</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="enrollment.html">Enrollment Registration</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="finalization.html">Finalization</a>
          <li class="nav-item">
  <a class="nav-link" href="approval.html">Approval</a>
</li>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5">
  <div class="form-box animate-slide-up">
    <h2>Finalize Membership</h2>

    <form id="finalForm">

      <div class="mb-3">
        <label class="form-label">Full Name *</label>
        <input type="text" id="finalName" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Email *</label>
        <input type="email" id="finalEmail" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Participation Type *</label>
        <select id="participation" class="form-control">
          <option value="">Select</option>
          <option>In-Person</option>
          <option>Virtual</option>
          <option>VIP</option>
        </select>
      </div>

      <button type="submit" class="btn btn-dark">Submit</button>

    </form>

    <div id="output" class="mt-4"></div>

  </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$("#finalForm").on("submit", function(e){
  e.preventDefault();

  let name = $("#finalName").val();
  let email = $("#finalEmail").val();
  let type = $("#participation").val();

  if(name === "" || email === "" || type === ""){
    alert("Please fill all required fields");
    return;
  }

  let data = {
    name: name,
    email: email,
    participation: type,
    status: "pending"
  };

  fetch("http://localhost:5000/api/submissions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(response => response.json())
  .then(response => {
    $("#output").html("<pre>" + JSON.stringify(response, null, 2) + "</pre>");
    alert("Transaction submitted successfully");
  })
  .catch(error => {
    alert("Submission failed");
  });
});
</script>

</body>
</html>
