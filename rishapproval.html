<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Approval | [Your New Project Name]</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header class="top-bar">
    <div class="container">
      <h1 class="site-title">Approval Page</h1>
      <p class="site-subtitle">Manage Pending Transactions</p>
    </div>
  </header>

  <nav class="navbar navbar-expand-lg custom-nav">
    <div class="container">
      <a class="navbar-brand nav-brand" href="index.html">[Your New Project Name]</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="enrollment.html">Enrollment Registration</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="finalization.html">Finalization</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="approval.html">Approval</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5 animate-slide-up">
    <div class="table-box">
      <h2 class="mb-3">Pending Transactions</h2>
      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Participation</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="approvalTable"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="footer-area">
    <div class="container">
      <p class="mb-0">[Your New Project Name] | Student Club Portal Project</p>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
  const loadPending = () => {
    fetch("http://localhost:3000/transactions")
      .then(res => res.json())
      .then(data => {
        let rows = "";

        data.forEach(transaction => {
          if(transaction.status === "pending") {
            rows += `
              <tr>
                <td>${transaction.id}</td>
                <td>${transaction.name}</td>
                <td>${transaction.email}</td>
                <td>${transaction.participation}</td>
                <td>
                  <button class="btn btn-success btn-sm me-2" onclick="updateStatus(${transaction.id}, 'approved')">Approve</button>
                  <button class="btn btn-danger btn-sm" onclick="updateStatus(${transaction.id}, 'declined')">Decline</button>
                </td>
              </tr>
            `;
          }
        });

        $("#approvalTable").html(rows);
      });
  }

  const updateStatus = (id, status) => {
    fetch(`http://localhost:3000/transactions/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ status: status })
    })
    .then(res => res.json())
    .then(() => {
      alert("Updated!");
      loadPending();
    });
  }

  loadPending();
  </script>
</body>
</html>
